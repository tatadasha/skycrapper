<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR 3D Model Viewer</title>

    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

    <style>
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #f2f2f2, #e6e6e6);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
        }

        .card {
            width: 100%;
            max-width: 540px;
            padding: 35px 25px;
            border-radius: 28px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            background: rgba(255, 255, 255, 0.55);
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
            text-align: center;
            color: #333;
        }

        h1 {
            margin: 0;
            font-size: 38px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .subtitle {
            margin-top: 10px;
            font-size: 16px;
            color: #666;
            font-weight: 400;
        }

        model-viewer {
            width: 100%;
            height: 55vh;
            max-height: 500px;
            margin-top: 25px;
            border-radius: 22px;
            overflow: hidden;
            background: rgba(255,255,255,0.4);
        }

        button[slot="ar-button"] {
            margin-top: 20px;
            width: 100%;
            padding: 22px;
            font-size: 18px;
            font-weight: 600;
            border-radius: 50px;
            border: 1px solid rgba(0,0,0,0.08);
            background: rgba(255,255,255,0.8);
            color: #333;
            cursor: pointer;
            transition: all 0.25s ease;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
        }

        button[slot="ar-button"]:hover {
            transform: scale(1.03);
            background: #ffffff;
        }

        p {
            margin-top: 18px;
            font-size: 14px;
            color: #666;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 30px;
            }

            .subtitle {
                font-size: 14px;
            }

            model-viewer {
                height: 50vh;
            }

            button[slot="ar-button"] {
                font-size: 20px;
                padding: 24px;
            }
        }
    </style>
</head>

<body>

    <div class="card">
        <h1>Небоскреб</h1>
        <div class="subtitle"> Моченцов Антон <br> Дроздова Дарья <br> Орлянская Мария</div>

        <model-viewer 
            src="skyscraper.glb" 
            ar 
            ar-modes="scene-viewer quick-look webxr" 
            camera-controls 
            shadow-intensity="1"
            alt="skyscraper">

            <button slot="ar-button">
                Открыть в AR
            </button>

        </model-viewer>

        <p>Нажмите кнопку, чтобы открыть модель в дополненной реальности.</p>
    </div>

</body>
</html>
